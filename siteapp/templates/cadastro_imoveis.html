<!DOCTYPE html>
{% load static%}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Imóvel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h2 class="mb-4 text-warning">Cadastrar Imóvel</h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Tipo do imóvel</label>
            <select class="form-control" name="tipo_imovel">
                <option>Casa</option>
                <option>Apartamento</option>
                <option>Terreno</option>
                <option>Comercial</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control" name="endereco">
        </div>

        <div class="mb-3">
            <label class="form-label">Valor do imóvel</label>
            <input type="number" class="form-control" name="valor_imovel">
        </div>

        <div class="mb-3">
            <label class="form-label">Proprietário</label>
            <input type="text" class="form-control" placeholder="Nome ou CPF do proprietário">
        </div>

        <button class="btn btn-warning">Salvar</button>
        <a href="{% url 'home' %}" class="btn btn-secondary">Voltar</a>

    </form>

</body>
</html>
