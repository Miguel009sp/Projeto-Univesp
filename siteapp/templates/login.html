<!DOCTYPE html>
 {% load static %}
<html lang="pt-br">
   
<head>
    <meta charset="UTF-8">
    <title>Login - Imobiliária</title>
   
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 300px;">
        <h4 class="text-center mb-3">Imobiliária</h4>

        {% if erro %}<!-- Exibe mensagem de erro se houver -->
            <div class="alert alert-danger">
                {{ erro }}
            </div>
        {% endif %}

        <form method="POST"> <!-- Formulário de login -->
            {% csrf_token %} <!-- Token de segurança para proteger contra CSRF -->

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="usuario" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Entrar
            </button>
        </form>
    </div>

</body>
</html>
