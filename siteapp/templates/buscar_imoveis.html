<!DOCTYPE html>
{% load static%}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h2 class="mb-4 text-secondary">Buscar Imóveis</h2>

    <form method="get">
        <div class="mb-3">
            <label class="form-label">Tipo de imóvel</label>
            <select class="form-control" name="tipo_imovel">
                <option>Todos</option>
                <option>Casa</option>
                <option>Apartamento</option>
                <option>Terreno</option>
                <option>Comercial</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Valor máximo (R$)</label>
            <input type="number" class="form-control" name="valor_maximo">
        </div>

        <button class="btn btn-secondary">Buscar</button>
        <a href="{% url 'home' %}" class="btn btn-light">Voltar</a>
    </form>

</body>
</html>
